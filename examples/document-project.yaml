northstar_markdown: |
  # Goal

  Write a comprehensive technical report on AI-assisted OCR quality assurance for historical legal documents such as deeds, easements, and title chains.

  # Required sections, in order

  1. Introduction — the problem of processing scanned historical legal documents at scale
  2. OCR Challenges — varying scan quality, handwriting, degraded paper, and critical accuracy requirements
  3. Mixture of Experts — using multiple vision models in parallel to cross-check transcriptions
  4. Verification Strategy — comparing model outputs, computing confidence, flagging disagreements
  5. Human Review — focusing manual effort only on uncertain or high-risk segments
  6. Conclusion — path toward trustworthy automated transcription for title insurance workflows

  # Quality requirements

  Each section must contain substantive content (not just a heading). Numbers, names, and legal
  descriptions must be treated as high-risk fields requiring explicit verification notes.

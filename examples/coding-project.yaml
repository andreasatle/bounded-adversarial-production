northstar_markdown: |
  # Goal

  Implement a text similarity comparison utility with pytest tests.

  # Expected output layout

  - `src/similarity.py` — must contain:
    - `normalize(text: str) -> str` — lowercase, strip punctuation, collapse whitespace
    - `token_overlap(a: str, b: str) -> float` — Jaccard similarity on word tokens (0.0–1.0)
    - `compare(a: str, b: str) -> dict` — returns {"a": normalized_a, "b": normalized_b, "score": float}
  - `tests/test_similarity.py` — must contain pytest tests covering:
    - `normalize`: empty string, punctuation stripping, case folding, whitespace collapsing
    - `token_overlap`: identical inputs (1.0), disjoint inputs (0.0), partial overlap
    - `compare`: integration test asserting all three keys are present and score is in [0, 1]

  # Exact return type contract — do not deviate

  - `normalize` returns `str`
  - `token_overlap` returns `float` in [0.0, 1.0] — NOT a set, NOT a count
  - `compare` returns `dict` with exactly three keys: "a" (str), "b" (str), "score" (float)

  # Quality requirements

  All functions must have type annotations. Tests must use plain pytest (no mocking).

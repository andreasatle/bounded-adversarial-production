northstar_markdown: |
  # Goal

  Implement a word frequency counter in Rust with comprehensive tests.

  # Expected output layout

  - `src/lib.rs` — must contain:
    - `pub fn word_frequency(text: &str) -> Vec<(String, usize)>` — returns words and
      their counts sorted by frequency descending, ties broken alphabetically
    - `pub fn top_n(text: &str, n: usize) -> Vec<(String, usize)>` — returns the top N
      most frequent words
  - `Cargo.toml` — valid Cargo manifest, no external dependencies
  - Tests in `#[cfg(test)]` modules inside `src/lib.rs` covering:
    - empty string returns empty vec
    - single word returns count of 1
    - multiple words counted correctly
    - sort order: frequency descending, ties alphabetical
    - case folding: "The" and "the" count as the same word
    - punctuation stripping: "word," and "word" count as the same word
    - `top_n` returns at most n results
    - `top_n` with n larger than unique word count returns all words

  # Exact return type contract — do not deviate

  - `word_frequency` returns `Vec<(String, usize)>` sorted by count descending,
    ties broken alphabetically ascending
  - `top_n` returns `Vec<(String, usize)>` — same shape, truncated to n items
  - Both functions treat input as case-insensitive and strip punctuation

  # Quality requirements

  All functions must be `pub` with doc comments. Tests use `#[test]` only —
  no external test frameworks. Project must compile and all tests must pass
  with `cargo test`.